<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150" role="img" aria-labelledby="title desc">
  <title id="title">Held-out all-gene deletion progress</title>
  <desc id="desc">A green lightsaber-like progress bar showing 100.00 percent completion.</desc>
  <defs>
    <linearGradient id="track" x1="0" x2="1"><stop stop-color="#e8eef2"/><stop offset="1" stop-color="#dce6ea"/></linearGradient>
    <linearGradient id="blade" x1="0" x2="1"><stop stop-color="#20d878"/><stop offset=".5" stop-color="#b9ffd5"/><stop offset="1" stop-color="#16b866"/></linearGradient>
    <filter id="glow" x="-20%" y="-100%" width="140%" height="300%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="150" fill="#fff"/>
  <text x="44" y="31" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#273746">Held-out all-gene deletion progress</text>
  <rect x="44" y="52" width="812" height="34" rx="17" fill="url(#track)" stroke="#b6c8d2"/>
  <rect x="89" y="55" width="770.0" height="28" rx="14" fill="url(#blade)" filter="url(#glow)">
    <animate attributeName="width" values="770.0;770.0;770.0" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="859.0" cy="69" r="8" fill="#f2fff7" filter="url(#glow)"><animate attributeName="cx" values="859.0;859.0;859.0" dur="2.4s" repeatCount="indefinite"/></circle>
  <rect x="47" y="58" width="34" height="22" rx="5" fill="#252c34" stroke="#7d8790" stroke-width="1"/>
  <rect x="51" y="60" width="5" height="18" rx="2" fill="#dfe6ea"/>
  <rect x="58" y="59" width="13" height="20" rx="3" fill="#3f4a55"/>
  <rect x="67" y="61" width="7" height="16" rx="2" fill="#a7b0b8"/>
  <rect x="85" y="67" width="4" height="4" rx="2" fill="#ffffff" opacity=".75"/>
  <text x="44" y="119" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#425b70">3,379 / 3,379 cells  |  100.00%  |  IDLE</text>
</svg>
